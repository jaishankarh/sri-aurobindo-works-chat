services:
  # ── PostgreSQL with pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aurobindo_postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: rag_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j (knowledge graph store) ────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: aurobindo_neo4j
    environment:
      NEO4J_AUTH: neo4j/aurobindo_graph
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7475:7474" # Browser UI
      - "7688:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p aurobindo_graph 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aurobindo_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prefect server (orchestration UI + API) ──────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-python3.11
    container_name: aurobindo_prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4201:4200"
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: http://localhost:4201/api
    healthcheck:
      # prefecthq/prefect image has no curl; use python3 (always present) instead
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Ollama (local LLM server for Apple Silicon / GPU) ──────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aurobindo_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurobindo_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://rag:ragpassword@postgres:5432/rag_db
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: aurobindo_graph
      PREFECT_API_URL: http://prefect:4200/api
      # LLM + embedding provider: set these in .env to switch modes (e.g.
      # LLM_PROVIDER=gemini, EMBEDDING_PROVIDER=gemini) without editing this
      # file — defaults below give the fully-local mode.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-bge_m3}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3002"]'
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend:ro
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      prefect:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_WS_URL: ws://localhost:8001
    container_name: aurobindo_frontend
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  ollama_data:
  huggingface_cache:
