server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # nginx's bundled mime.types has no .mjs entry, so it falls back to
    # application/octet-stream — browsers refuse to execute a dynamically
    # imported ES module served with a non-JS content type (broke the PDF.js
    # worker, pdf.worker.min.mjs, loaded via `import()`). Scoped to just this
    # location's default_type rather than a server-level `types {}` block —
    # that block form REPLACES the entire inherited MIME map rather than
    # extending it, which briefly broke every other content type (including
    # index.html itself) the first time this was "fixed".
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
